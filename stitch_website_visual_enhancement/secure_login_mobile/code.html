<style>
    .glass-keypad-btn {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-keypad-btn:active {
      background: rgba(173, 198, 255, 0.2);
      transform: scale(0.92);
      border-color: rgba(173, 198, 255, 0.4);
    }
    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #424754;
      transition: all 0.3s ease;
    }
    .pin-dot.filled {
      background-color: #adc6ff;
      border-color: #adc6ff;
      box-shadow: 0 0 12px rgba(173, 198, 255, 0.6);
    }
    .bg-mesh {
      background-color: #0b1326;
      background-image: 
        radial-gradient(at 0% 0%, rgba(77, 142, 255, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(0, 46, 106, 0.2) 0px, transparent 50%);
    }
    @keyframes pulse-security {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .animate-security {
      animation: pulse-security 3s infinite ease-in-out;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-mesh min-h-screen text-on-surface font-body-md overflow-hidden flex flex-col">
<!-- Header / Top Bar -->
<header class="w-full h-16 flex items-center justify-between px-margin-mobile top-0 sticky z-50">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-[20px]" data-icon="account_balance">account_balance</span>
</div>
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Azure Ledger</h1>
</div>
<div class="flex items-center gap-2">
<div class="px-2 py-1 rounded-full bg-surface-container-high border border-border-glass flex items-center gap-1.5">
<span class="w-2 h-2 rounded-full bg-success animate-security"></span>
<span class="font-label-md text-label-md text-on-surface-variant">SECURE</span>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile pb-12">
<!-- Hero Text -->
<div class="text-center mb-10">
<h2 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">Family Wealth Office Secure Access</p>
</div>
<!-- PIN Indicator -->
<div class="flex gap-6 mb-12" id="pin-indicator">
<div class="pin-dot"></div>
<div class="pin-dot"></div>
<div class="pin-dot"></div>
<div class="pin-dot"></div>
<div class="pin-dot"></div>
<div class="pin-dot"></div>
</div>
<!-- Keypad Grid -->
<div class="grid grid-cols-3 gap-4 w-full max-w-[320px]">
<!-- 1-9 -->
<button class="glass-keypad-btn aspect-square rounded-full flex items-center justify-center" onclick="handleKey('1')">
<span class="font-headline-md text-headline-md">1</span>
</button>
<button class="glass-keypad-btn aspect-square rounded-full flex items-center justify-center" onclick="handleKey('2')">
<span class="font-headline-md text-headline-md">2</span>
</button>
<button class="glass-keypad-btn aspect-square rounded-full flex items-center justify-center" onclick="handleKey('3')">
<span class="font-headline-md text-headline-md">3</span>
</button>
<button class="glass-keypad-btn aspect-square rounded-full flex items-center justify-center" onclick="handleKey('4')">
<span class="font-headline-md text-headline-md">4</span>
</button>
<button class="glass-keypad-btn aspect-square rounded-full flex items-center justify-center" onclick="handleKey('5')">
<span class="font-headline-md text-headline-md">5</span>
</button>
<button class="glass-keypad-btn aspect-square rounded-full flex items-center justify-center" onclick="handleKey('6')">
<span class="font-headline-md text-headline-md">6</span>
</button>
<button class="glass-keypad-btn aspect-square rounded-full flex items-center justify-center" onclick="handleKey('7')">
<span class="font-headline-md text-headline-md">7</span>
</button>
<button class="glass-keypad-btn aspect-square rounded-full flex items-center justify-center" onclick="handleKey('8')">
<span class="font-headline-md text-headline-md">8</span>
</button>

<span class="font-headline-md text-headline-md">9</span>
</button>
<!-- Bottom Row -->
<button class="glass-keypad-btn aspect-square rounded-full flex items-center justify-center" onclick="clearPin()">
<span class="font-label-md text-label-md text-error">CLEAR</span>
</button>
<button class="glass-keypad-btn aspect-square rounded-full flex items-center justify-center" onclick="handleKey('0')">
<span class="font-headline-md text-headline-md">0</span>
</button>
<button class="glass-keypad-btn aspect-square rounded-full flex items-center justify-center" onclick="backspace()">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="backspace">backspace</span>
</button>
</div>
<!-- Additional Options -->
<div class="mt-12 flex flex-col items-center gap-4">
<button class="font-label-md text-label-md text-primary tracking-widest uppercase opacity-70 hover:opacity-100 transition-opacity">Forgot PIN?</button>
</div>

<!-- Footer Security Info -->
<footer class="w-full py-8 px-margin-mobile flex flex-col items-center gap-4 bg-surface-container-lowest/50 border-t border-border-glass backdrop-blur-sm">

<span class="material-symbols-outlined text-primary text-[20px]" data-icon="encrypted" data-weight="fill" style="font-variation-settings: 'FILL' 1;">encrypted</span>

</div>
<div class="flex items-center gap-2 opacity-40">
<span class="material-symbols-outlined text-[16px]" data-icon="shield_lock">shield_lock</span>
<p class="font-label-md text-[10px] uppercase tracking-[0.2em]">© 2024 Azure Ledger Wealth Management</p>
</div>
</footer>
<script>
    let currentPin = "";
    const maxPinLength = 6;
    const dots = document.querySelectorAll('.pin-dot');

    function updateDots() {
      dots.forEach((dot, index) => {
        if (index < currentPin.length) {
          dot.classList.add('filled');
        } else {
          dot.classList.remove('filled');
        }
      });
    }

    function handleKey(num) {
      if (currentPin.length < maxPinLength) {
        currentPin += num;
        updateDots();
        
        if (currentPin.length === maxPinLength) {
          // Simulation of success/processing
          setTimeout(() => {
            document.getElementById('pin-indicator').classList.add('animate-pulse');
            // Logic for authentication would go here
          }, 200);
        }
      }
    }

    function backspace() {
      currentPin = currentPin.slice(0, -1);
      updateDots();
      document.getElementById('pin-indicator').classList.remove('animate-pulse');
    }

    function clearPin() {
      currentPin = "";
      updateDots();
      document.getElementById('pin-indicator').classList.remove('animate-pulse');
    }

    // Haptic feedback simulation for buttons
    document.querySelectorAll('.glass-keypad-btn').forEach(btn => {
      btn.addEventListener('touchstart', () => {
        if (window.navigator.vibrate) {
          window.navigator.vibrate(10);
        }
      });
    });
  </script>
